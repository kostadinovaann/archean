name: Flutter CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable web support
        run: flutter config --enable-web

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze project
        working-directory: frontend
        run: flutter analyze

      - name: Run tests
        working-directory: frontend
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No tests found, skipping flutter test."
          fi

      - name: Build web output
        working-directory: frontend
        run: |
          if [ -d web ]; then
            flutter build web
          else
            echo "Web not configured, skipping flutter build web."
          fi
